<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oneshot UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="oneshot">
    <div id="messages">
    </div>
    <div id="input-section">
        <div id="toggle-buttons">
            <button id="toggle-sound">Mute Sound</button>
            <button id="toggle-input">Hide Input</button>
        </div>
        <div id="message-row">
            <textarea id="message" placeholder="Type a message"></textarea>
            <div class="button-group">
                <button id="chat-button" type="button">Chat</button>
                <button id="agent-button" type="button">Agent</button>
            </div>
        </div>
        <div class="dropdown-row-1">
            <select id="pattern">
                <option>Loading patterns...</option>
            </select>
            <select id="model">
                <option>Loading models...</option>
            </select>
        </div>
        <div class="dropdown-row-2">
            <select id="markdown">
                <option>Loading files...</option>
            </select>
        </div>
    </div>
    <div id="version">
    </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
