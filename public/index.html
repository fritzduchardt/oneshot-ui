<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oneshot UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
</head>
<body>
<div id="oneshot">
    <div id="messages">
        <div id="version"></div>
        <div id="controls">
            <button id="toggle-sound">Toggle Sound</button>
            <button id="toggle-input">Toggle Input</button>
        </div>
    </div>
    <div id="input-section">
        <div id="message-row">
            <textarea id="message" placeholder="Type a message" rows="3"></textarea>
            <div class="button-group">
                <button id="chat-button" type="button">Chat</button>
                <button id="mcp-button" type="button">MCP</button>
            </div>
        </div>
        <div class="dropdown-row-1">
            <select id="pattern">
                <option>Loading patterns...</option>
            </select>
            <button  class="show-button" id="show-pattern" type="button">Show</button>
            <select id="model">
                <option>Loading models...</option>
            </select>
        </div>
        <div class="dropdown-row-2">
            <select id="markdown">
                <option>Loading files...</option>
            </select>
            <button class="show-button" id="show-markdown" type="button">Show</button>
        </div>
    </div>

</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
