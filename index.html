<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oneshot UI</title>
    <link rel="manifest" href="public/manifest.json">
    <link rel="stylesheet" href="src/styles/main.css">
    <!-- Choices -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/choices.js@11.1.0/public/assets/styles/choices.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/choices.js@11.1.0/public/assets/scripts/choices.min.js"></script>
</head>
<body>
<div id="chat">
    <div id="messages">
        <div id="toggle-buttons">
            <button id="toggle-sound">Mute Sound</button>
            <button id="toggle-input">Hide Input</button>
        </div>
    </div>
    <div id="input-section">
        <div id="message-row">
            <textarea id="message" placeholder="Type a message"></textarea>
            <div class="button-group">
                <button id="send-button" type="button">Send</button>
            </div>
        </div>
        <div class="dropdown-row-1">
            <select id="pattern">
                <option>Loading patterns...</option>
            </select>
            <select id="model">
                <option>Loading models...</option>
            </select>
        </div>
        <div class="dropdown-row-2">
            <select id="markdown">
                <option>Loading files...</option>
            </select>
        </div>
    </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
